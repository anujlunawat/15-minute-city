# docker-compose.yml
version: '3.8'

services:
  backend:
    container_name: 15min-city-backend
    image: 15min-city-backend-img
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the duckdb file so data persists even if the container restarts
      - ./backend:/app
      - ./backend/requirements.txt:/app/requirements.txt
      - ./backend/accessibility.duckdb:/app/accessibility.duckdb
    environment:
      - ENVIRONMENT=production

  frontend:
    container_name: 15min-city-frontend
    image: 15min-city-frontend-img
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    # args:
    #   - VITE_API_BASE=${VITE_API_BASE}
    ports:
      - "80:80"
    depends_on:
      - backend
